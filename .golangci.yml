version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - misspell
    - prealloc
    - modernize
    - gosec
    - bodyclose
    - noctx
    - exhaustive
    - errorlint
    - unparam
    - nakedret

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
    revive:
      rules:
        - name: exported
          disabled: true

  exclusions:
    paths:
      - director-tools
      - snapshot
      - example
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - gosec
