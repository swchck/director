name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Start services
        run: docker compose up -d

      - name: Wait for Directus
        run: |
          echo "Waiting for Directus to be healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8055/server/health > /dev/null 2>&1; then
              echo "Directus is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Directus did not become healthy in time"
          exit 1

      - name: Run E2E tests
        run: go test -race -count=1 -tags=e2e -timeout=120s ./e2e/...
        env:
          DIRECTUS_URL: "http://localhost:8055"
          DIRECTUS_TOKEN: "e2e-test-token"
          DATABASE_URL: "postgres://directus:directus@localhost:5433/directus?sslmode=disable"
          REDIS_URL: "localhost:6379"

      - name: Service logs
        if: failure()
        run: docker compose logs
