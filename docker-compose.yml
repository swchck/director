services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  directus:
    image: directus/directus:${DIRECTUS_VERSION:-11}
    ports:
      - "8055:8055"
    environment:
      SECRET: "e2e-test-secret-key-change-in-production"
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "admin"
      ADMIN_TOKEN: "e2e-test-token"
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: directus
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WEBSOCKETS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8055/server/health || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s

volumes:
  pgdata:
